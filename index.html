<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Core -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#030712" />
    <meta name="application-name" content="Aethelis OS" />
    <meta name="description" content="Aethelis OS - A Sovereign Web OS. The Zero-Staff Paradigm for planetary-scale autonomy." />

    <!-- iOS Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aethelis OS" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- iOS Safe Area Insets -->
    <meta name="apple-touch-fullscreen" content="yes" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Windows PWA -->
    <meta name="msapplication-TileColor" content="#030712" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="msapplication-navbutton-color" content="#030712" />

    <!-- Theme Colors -->
    <meta name="color-scheme" content="dark" />
    <meta name="background-color" content="#030712" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />

    <!-- Service Worker Registration -->
    <link rel="prefetch" href="/service-worker.js" as="script" />

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- OG Tags -->
    <meta property="og:title" content="Aethelis OS - Sovereign Web Operating System" />
    <meta property="og:description" content="A planetary-scale autonomous operating system. The Zero-Staff Paradigm." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aethelis OS" />
    <meta name="twitter:description" content="A Sovereign Web Operating System" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />

    <!-- Prevent iOS Automatic Detection -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />

    <title>Aethelis OS</title>

    <!-- Inline Critical CSS for PWA Launch -->
    <style>
      html, body, #root {
        background: #030712;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        padding: 0;
        overflow: hidden;
        -webkit-overflow-scrolling: touch;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at 30% 30%, rgba(34, 211, 238, 0.08) 0%, transparent 50%),
                    radial-gradient(ellipse at 70% 70%, rgba(168, 85, 247, 0.06) 0%, transparent 50%);
        pointer-events: none;
        z-index: -1;
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Script -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(registration => {
              console.log('[Aethelis PWA] Service Worker registered:', registration.scope);
            })
            .catch(error => {
              console.log('[Aethelis PWA] Service Worker registration failed:', error);
            });
        });
      }
    </script>

    <!-- iOS Standalone Mode Detection -->
    <script>
      // Detect iOS standalone mode
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
                          window.navigator.standalone ||
                          document.referrer.includes('start_url');

      if (isStandalone) {
        document.documentElement.classList.add('pwa-standalone');
      }

      // iOS Safe Area Insets
      document.documentElement.style.setProperty('--sat', 'env(safe-area-inset-top)');
      document.documentElement.style.setProperty('--sar', 'env(safe-area-inset-right)');
      document.documentElement.style.setProperty('--sab', 'env(safe-area-inset-bottom)');
      document.documentElement.style.setProperty('--sal', 'env(safe-area-inset-left)');
    </script>
  </body>
</html>
